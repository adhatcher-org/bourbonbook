name: Docker Publish

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

jobs:
  publish:
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == github.event.repository.default_branch) ||
      (github.event_name == 'workflow_dispatch' &&
       github.ref_name == github.event.repository.default_branch)
    permissions:
      contents: write
      packages: write
    concurrency:
      group: docker-publish
      cancel-in-progress: false
    uses: adhatcher-org/shared-workflows/.github/workflows/docker-publish.yml@cc0291a44a46d85315af39d125bdc7f293b85b9b # pending v1.0.2
    with:
      package-name: bourbonbook
      checkout-ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      create-git-tag: true
