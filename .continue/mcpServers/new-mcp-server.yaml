name: Local MCP Servers
version: 0.0.1
schema: v1

mcpServers:
  - name: GitHub
    type: stdio
    command: /usr/local/bin/docker
    args:
      - run
      - -i
      - --rm
      - -e
      - GITHUB_PERSONAL_ACCESS_TOKEN
      - -e
      - GITHUB_TOOLSETS=repos,issues,pull_requests,actions,code_security
      - ghcr.io/github/github-mcp-server:main
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_PAT }}

  - name: Playwright
    type: stdio
    command: /Users/aaron/.nvm/versions/node/v22.14.0/bin/npx
    args:
      - -y
      - "@playwright/mcp@latest"
      - --headless