services:
  bourbonbook:
    build: .
    image: ghcr.io/adhatcher-org/bourbonbook:latest
    container_name: bourbonbook
    restart: unless-stopped
    ports:
      - "8088:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /data
      OLLAMA_URL: http://ollama:11434
    volumes:
      - bourbonbook-data:/data
    networks:
      - bourbon-services
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  bourbonbook-data:

networks:
  bourbon-services:
    name: bourbon-services
